# ═══════════════════════════════════════════════════════════
#   ShuraCore Messages
#   Supports: & color codes, &#RRGGBB hex colors
#   Placeholders vary per message — see comments above each section
# ═══════════════════════════════════════════════════════════

# Global prefix prepended to messages that use {prefix}
# Set prefix-enabled: false to remove the prefix from all messages
prefix-enabled: false
prefix: "&#00B4FF&lShura&r&7PvP &8» &r"

# ─────────────────────────────────────────
# DUEL
# Placeholders: {player}, {target}, {kit}, {format}
# ─────────────────────────────────────────
duel:
  request-sent: "{prefix}&aYou sent a duel request to &e{target}&a."
  request-received: "{prefix}&e{player} &achallenged you to a duel! &7[&b&lClick Here&7]"
  request-expired-sender: "{prefix}&cYour duel request to &e{target} &cexpired."
  request-expired-receiver: "{prefix}&cDuel request from &e{player} &cexpired."
  request-cancelled: "{prefix}&cDuel request cancelled."
  already-sent: "{prefix}&cYou already sent a duel request to &e{target}&c."
  no-request: "{prefix}&cYou have no pending duel request."
  target-in-match: "{prefix}&e{target} &cis already in a match."
  target-in-queue: "{prefix}&e{target} &cis currently in a queue."
  you-in-match: "{prefix}&cYou cannot duel while in a match."
  you-in-queue: "{prefix}&cYou cannot duel while in a queue."
  self-duel: "{prefix}&cYou cannot duel yourself."
  accepted: "{prefix}&aYou accepted the duel request."
  denied: "{prefix}&cYou denied the duel request."
  denied-sender: "{prefix}&e{target} &cdenied your duel request."

# ─────────────────────────────────────────
# QUEUE
# Placeholders: {tierlist}, {elo}
# ─────────────────────────────────────────
queue:
  joined: "{prefix}&aYou joined the &e{tierlist} &aqueue."
  left: "{prefix}&cYou left the &e{tierlist} &cqueue."
  already-in: "{prefix}&cYou are already in a queue."
  in-match: "{prefix}&cYou cannot queue while in a match."
  not-available: "{prefix}&cThat queue is not currently available."
  match-found: "{prefix}&#FFD700Match found! &eOpponent: &b{target}"
  no-queues-enabled: "{prefix}&cNo queues are currently enabled."

# ─────────────────────────────────────────
# MATCH
# Placeholders: {player}, {target}, {kit}, {format}, {elo}, {change},
#               {rank}, {tierlist}, {seconds}, {round}, {wins}, {losses}
# ─────────────────────────────────────────
match:
  countdown: "{prefix}&eMatch starting in &#FFD700{seconds}&e..."
  started: "{prefix}&#00FF7FFight! &7(&e{format}&7)"
  round-won: "{prefix}&#00FF7F{player} &awon round &e{round}&a! &7({wins}&7-&7{losses})"
  ended-win: "{prefix}&#FFD700You won the match!"
  ended-loss: "{prefix}&cYou lost the match."
  left: "{prefix}&e{player} &cleft the match. &#FFD700{target} &awins!"
  rank-up: "{prefix}&#FFD700You ranked up to &#00B4FF{rank} &ein &b{tierlist}&e!"
  rank-down: "{prefix}&cYou ranked down to &e{rank} &cin &b{tierlist}&c."

# ─────────────────────────────────────────
# PARTY
# Placeholders: {player}, {target}, {count}
# ─────────────────────────────────────────
party:
  created: "{prefix}&aParty created! Use &e/party invite <player> &ato invite players."
  disbanded: "{prefix}&cThe party has been disbanded."
  invite-sent: "{prefix}&aInvite sent to &e{target}&a."
  invite-received: "{prefix}&e{player} &ainvited you to their party! &7(/party accept)"
  invite-expired: "{prefix}&cParty invite from &e{player} &cexpired."
  accepted: "{prefix}&aYou joined &e{player}&a's party!"
  joined-broadcast: "{prefix}&e{player} &ajoined the party!"
  left: "{prefix}&e{player} &cleft the party."
  kicked: "{prefix}&e{player} &cwas kicked from the party."
  kicked-self: "{prefix}&cYou were kicked from the party."
  disbanded-broadcast: "{prefix}&cThe party has been disbanded."
  leader-transferred: "{prefix}&e{player} &ais now the party leader."
  not-leader: "{prefix}&cOnly the party leader can do that."
  not-in-party: "{prefix}&cYou are not in a party."
  already-in-party: "{prefix}&cYou are already in a party."
  target-in-party: "{prefix}&e{target} &cis already in a party."
  already-invited: "{prefix}&cYou already sent an invite to &e{target}&c."
  no-invite: "{prefix}&cYou have no pending party invite."
  cannot-kick-self: "{prefix}&cYou cannot kick yourself."
  target-not-in-party: "{prefix}&e{target} &cis not in your party."
  info-header: "&#00B4FF&lParty &8— &7Leader: &e{player} &8| &7Members: &e{count}"
  info-member: "  &7- &e{player}"
  chat-format: "&#00FF00[Party] &e{player}&7: &f{message}"

# ─────────────────────────────────────────
# PRACTICE
# Placeholders: {gamemode}
# ─────────────────────────────────────────
practice:
  joined: "{prefix}&aJoined &e{gamemode} &aFFA practice."
  left: "{prefix}&cLeft &e{gamemode} &cpractice."
  not-configured: "{prefix}&cThat practice arena is not configured yet."
  in-match: "{prefix}&cYou cannot join practice while in a match."
  in-queue: "{prefix}&cYou cannot join practice while in a queue."

# ─────────────────────────────────────────
# SPECTATE
# Placeholders: {player}, {target}
# ─────────────────────────────────────────
spectate:
  now-spectating: "{prefix}&aSpectating &e{player} &avs &e{target}&a."
  stopped: "{prefix}&7You stopped spectating."
  not-in-match: "{prefix}&e{target} &cis not in a match."
  already-spectating: "{prefix}&cYou are already spectating a match."
  in-match: "{prefix}&cYou cannot spectate while in a match."
  no-matches: "{prefix}&cThere are no active matches to spectate."

# ─────────────────────────────────────────
# RANKINGS
# Placeholders: {tierlist}, {pos}, {player}, {elo}, {rank}
# ─────────────────────────────────────────
rankings:
  header: "&#00B4FF&l{tierlist} &8— &7Top 10"
  entry: "  &8{pos}. &e{player} &8— &7Rank: {rank}"
  no-data: "{prefix}&7No players found for &e{tierlist}&7."

# ─────────────────────────────────────────
# CHAT FORMATS
# Placeholders: {player}, {message}, {gamemode}, {prefix}, {suffix}
# ─────────────────────────────────────────
chat:
  match: "&#00B4FF[Match] &f{player}&8: &7{message}"
  spectator: "&8[Spectator] &7{player}&8: &8{message}"
  practice: "&#00FF00[{gamemode}] &f{player}&8: &7{message}"
  lobby: "{prefix}&f{player}{suffix}&8: &f{message}"

# ─────────────────────────────────────────
# KIT
# Placeholders: {kit}
# ─────────────────────────────────────────
kit:
  saved: "{prefix}&aKit saved successfully!"
  reset: "{prefix}&aKit reset to default."
  not-found: "{prefix}&cKit &e{kit} &cnot found."

# ─────────────────────────────────────────
# MAINTENANCE
# ─────────────────────────────────────────
maintenance:
  enabled: "{prefix}&aMaintenance mode &aenabled."
  disabled: "{prefix}&aMaintenance mode &cdisabled."
  kick-message: "&#00B4FF&lShuraPvP\n\n&cThe server is currently under maintenance.\n&7Please try again later."
  join-blocked: "{prefix}&cThe server is currently under maintenance."

# ─────────────────────────────────────────
# WHITELIST
# ─────────────────────────────────────────
whitelist:
  command-blocked: "{prefix}&cYou don't have permission to use that command."

# ─────────────────────────────────────────
# ERRORS
# Placeholders: {target}, {seconds}, {usage}
# ─────────────────────────────────────────
errors:
  player-not-found: "{prefix}&cPlayer &e{target} &cnot found or offline."
  no-permission: "{prefix}&cYou don't have permission to do that."
  players-only: "{prefix}&cThis command can only be used by players."
  unknown-command: "{prefix}&cUnknown command."
  invalid-args: "{prefix}&cInvalid usage. &7{usage}"
  cooldown: "{prefix}&cPlease wait &e{seconds}s &cbefore doing that again."
  database-error: "{prefix}&cA database error occurred. Please try again."
