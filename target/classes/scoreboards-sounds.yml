sounds:
  countdown-tick:
    sound: BLOCK_NOTE_BLOCK_PLING
    volume: 1.0

  match-start:
    sound: ENTITY_ENDER_DRAGON_GROWL
    volume: 0.5
    pitch: 1.5

  match-win:
    sound: ENTITY_PLAYER_LEVELUP
    volume: 1.0
    pitch: 1.0

  match-loss:
    sound: ENTITY_WITHER_SPAWN
    volume: 0.3
    pitch: 1.5

  round-win:
    sound: UI_TOAST_CHALLENGE_COMPLETE
    volume: 0.7
    pitch: 1.2

  potion-apply:
    - sound: ENTITY_SPLASH_POTION_THROW
      volume: 0.8
      pitch: 1.0
    - sound: ENTITY_SPLASH_POTION_BREAK
      volume: 0.8
      pitch: 1.0

  queue-join:
    sound: BLOCK_NOTE_BLOCK_BASS
    volume: 1.0
    pitch: 1.0

  queue-leave:
    sound: BLOCK_NOTE_BLOCK_BASS
    volume: 1.0
    pitch: 0.5

  match-found:
    - sound: BLOCK_NOTE_BLOCK_PLING
      volume: 1.0
      pitch: 2.0
    - sound: BLOCK_NOTE_BLOCK_PLING
      volume: 1.0
      pitch: 1.8
    - sound: BLOCK_NOTE_BLOCK_PLING
      volume: 1.0
      pitch: 2.0

  gui-open:
    sound: ui.loom.take_result
    volume: 1.0
    pitch: 2.0

  gui-click:
    sound: minecraft:block.wooden_door.open ambient
    volume: 2.0
    pitch: 2.0

  gui-close:
    sound: ITEM_BOOK_PAGE_TURN
    volume: 0.6
    pitch: 0.8

  duel-request:
    sound: ENTITY_EXPERIENCE_ORB_PICKUP
    volume: 1.0
    pitch: 1.0

  duel-accept:
    sound: ENTITY_PLAYER_LEVELUP
    volume: 0.5
    pitch: 1.5

  rank-up:
    - sound: UI_TOAST_CHALLENGE_COMPLETE
      volume: 1.0
      pitch: 1.0
    - sound: ENTITY_PLAYER_LEVELUP
      volume: 1.0
      pitch: 1.2

  rank-down:
    sound: ENTITY_WITHER_AMBIENT
    volume: 0.5
    pitch: 1.0

  party-invite:
    sound: ENTITY_EXPERIENCE_ORB_PICKUP
    volume: 0.8
    pitch: 1.2

  party-create:
    - sound: ui.loom.take_result
      volume: 1.0
      pitch: 1.5
    - sound: item.goat_horn.sound.0
      volume: 1.0
      pitch: 1.5

  error:
    sound: ENTITY_VILLAGER_NO
    volume: 0.8
    pitch: 1.0

  success:
    sound: ENTITY_EXPERIENCE_ORB_PICKUP
    volume: 1.0
    pitch: 1.5

  teleport:
    sound: ENTITY_ENDERMAN_TELEPORT
    volume: 0.5
    pitch: 1.0

  maintenance-on:
    sound: BLOCK_BEACON_DEACTIVATE
    volume: 1.0
    pitch: 1.0

  maintenance-off:
    sound: BLOCK_BEACON_ACTIVATE
    volume: 1.0
    pitch: 1.0

  command-blocked:
    sound: "minecraft:block.note_block.didgeridoo"
    volume: 1.0
    pitch: 0.0
